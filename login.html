<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="./tailwind.css">
    <!-- Tailwind and Daisy UI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- font-awesome -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

      <!-- font go -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/tailwind.css">
</head>
<body>
<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <form id="loginForm" class="w-full max-w-md bg-white p-8 rounded-xl border border-blue-200 shadow-2xl">
    <div class="text-center mb-6">
     
      <img src="./assets/github-logo.png" alt="" class="w-16 h-16 mx-auto mb-4 flex items-center justify-center">
      <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
      <p class="text-gray-500">Sign in to manage your issues</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" placeholder="Enter Username" 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
        <p class="text-xs text-blue-600 mt-1">Default: admin</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" placeholder="Enter Password" 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
        <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
      </div>
    </div>

    <button type="submit" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
      Sign In
    </button>

    <div class="relative my-8">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
      <div class="relative flex justify-center text-sm"><span class="bg-white px-2 text-gray-500">OR</span></div>
    </div>

    <div class="bg-gray-50 p-4 rounded-lg text-center text-sm text-gray-600">
      <p class="mb-1 text-gray-400">Demo Credentials:</p>
      <p class="font-semibold">Username: <span class="text-gray-900">admin</span></p>
      <p class="font-semibold">Password: <span class="text-gray-900">admin123</span></p>
    </div>
  </form>

  <script src="./login.js"></script>
</div>
</body>
</html>
